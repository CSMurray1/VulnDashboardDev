<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MATRIX VULN // CVE DASHBOARD</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90' text-anchor='middle' x='50'%3E%F0%9F%AA%B2%3C/text%3E%3C/svg%3E">
<style>
:root {
  --bg: #02020a;
  --text: #d0ffd0;
  --panel: #0a0a12;
  --border: #00cc66;
  --accent: #00cc66;
  --neon-cyan: #40e0d0;
  --link: #40e0d0;
  --input-bg: #0f0f18;
  --input-text: #e0ffe0;
  --glow: rgba(0,204,102,0.35);
}

body {
  font-family: 'Courier New', Courier, monospace;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

#matrix-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  opacity: 0.08;
  pointer-events: none;
  mix-blend-mode: screen;
}

a { color: var(--link); text-decoration: none; }
a:hover { color: #fff; text-decoration: underline; }

nav {
  display: flex;
  background: #000;
  border-bottom: 2px solid var(--accent);
  box-shadow: 0 0 15px var(--glow);
}
nav button {
  flex: 1;
  padding: 16px;
  font-size: 15px;
  font-weight: bold;
  letter-spacing: 1.5px;
  background: transparent;
  color: var(--text);
  border: none;
  cursor: pointer;
  transition: 0.25s;
}
nav button.active {
  background: var(--accent);
  color: #000;
}
nav button:hover:not(.active) { background: rgba(0,204,102,0.15); }

header.cve-header {
  padding: 16px 24px;
  background: rgba(10,10,18,0.92);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 16px var(--glow);
}
header.cve-header h1 {
  margin: 0;
  font-size: 24px;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-shadow: 0 0 12px var(--accent);
}

#cve {
  flex: 1;
  min-width: 300px;
  padding: 12px 18px;
  font-size: 16px;
  background: var(--input-bg);
  border: 2px solid var(--border);
  color: var(--input-text);
  border-radius: 4px;
  box-shadow: inset 0 0 10px rgba(0,204,102,0.15);
}
.btn {
  padding: 10px 20px;
  font-weight: bold;
  letter-spacing: 1px;
  background: transparent;
  border: 2px solid var(--accent);
  color: var(--accent);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 0 10px var(--glow);
}
.btn:hover {
  background: var(--accent);
  color: #000;
  box-shadow: 0 0 20px var(--glow);
  transform: translateY(-1px);
}

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 0 16px var(--glow);
}
.panel > header {
  padding: 12px 18px;
  background: #111118;
  border-bottom: 1px solid var(--border);
  font-weight: bold;
  letter-spacing: 1px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.content { padding: 16px 18px; font-size: 14px; }
.item {
  padding: 10px 0;
  border-bottom: 1px dashed rgba(0,204,102,0.25);
}
.item:last-child { border: none; }
.title { color: #fff; font-weight: bold; margin-bottom: 4px; }
.meta { opacity: 0.85; }

.chip {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
  margin-left: 8px;
}
.low    { background:#1a4d1a; color:#90ff90; }
.medium { background:#4d4d1a; color:#ffff90; }
.high   { background:#4d2a1a; color:#ffcc90; }
.critical { background:#4d1a1a; color:#ff9090; }

.badge {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
}
.yes { background:#004400; color:#90ff90; border:1px solid #00cc66; }
.no  { background:#330000; color:#ff9090; border:1px solid #cc4444; }

#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #000;
  color: var(--accent);
  border: 2px solid var(--accent);
  padding: 12px 28px;
  border-radius: 4px;
  font-weight: bold;
  box-shadow: 0 0 20px var(--glow);
  display: none;
  z-index: 9999;
}

#loading {
  position: fixed;
  inset: 0;
  background: rgba(2,2,10,0.9);
  color: var(--accent);
  font-size: 24px;
  font-weight: bold;
  letter-spacing: 4px;
  display: none;
  place-items: center;
  z-index: 12000;
}

main.cve-main {
  padding: 20px;
  display: grid;
  grid-template-columns: 2fr 1fr 340px;
  gap: 20px;
  grid-template-areas:
    "details details watch"
    "sources relevant vulncheck";
}
@media (max-width: 1400px) {
  main.cve-main { grid-template-columns: 1fr 1fr; grid-template-areas: "details details" "watch watch" "vulncheck vulncheck" "sources relevant"; }
}
@media (max-width: 900px) {
  main.cve-main { grid-template-columns: 1fr; grid-template-areas: "details" "watch" "vulncheck" "sources" "relevant"; }
}

.feed {
  background: #0f0f18;
  border: 1px solid #00cc66;
  border-radius: 6px;
  padding: 16px;
  width: 340px;
  box-shadow: 0 0 12px rgba(0,204,102,0.2);
}
.feed h2 { color: var(--accent); margin: 0 0 12px 0; font-size: 15px; }

#analysisModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(2,2,10,0.9);
  z-index: 13000;
  place-items: center;
}
#analysisModal > div {
  background: #0a0a12;
  border: 2px solid var(--accent);
  padding: 24px;
  border-radius: 6px;
  max-width: 800px;
  width: 90%;
  max-height: 85vh;
  overflow: auto;
}
</style>
</head>

<nav>

    <div id="feed-container" style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center; padding:20px;"></div>
  </section>
</div>

<div id="toast"></div>

    <h3 style="margin:0 0 16px; color:var(--accent);">STATIC ANALYSIS</h3>

    <pre id="analysisBody" style="background:#000; padding:16px; border:1px solid var(--border); border-radius:4px; white-space:pre-wrap; min-height:200px; overflow:auto; font-size:13px;"></pre>
    <div style="margin-top:20px; display:flex; gap:12px; flex-wrap:wrap;">
      <button id="analysisCopy" class="btn">COPY</button>
      <button id="analysisSave" class="btn">SAVE MD</button>
      <button id="analysisClose" class="btn">CLOSE</button>
    </div>
  </div>
</div>

<script>
// ────────────────────────────────────────────── MATRIX RAIN
function initMatrixRain() {
  const canvas = document.getElementById('matrix-bg');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const fontSize = 14;
  let columns = canvas.width / fontSize;
  let drops = Array(Math.floor(columns)).fill(1);

  function draw() {
    ctx.fillStyle = 'rgba(2,2,10,0.06)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#00cc66';
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < drops.length; i++) {
      const text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  setInterval(draw, 45);
}

// ────────────────────────────────────────────── UTILS
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2800);
}

function linkRow(url, label) {
  return `<a href="${url}" target="_blank" rel="noopener noreferrer">${label || url}</a>`;
}

function isCVE(str) { return /^CVE-\d{4}-\d{4,}$/i.test(str); }

// ────────────────────────────────────────────── KEV
let kevCache = { loaded: false, data: null };
async function loadKEV() {
  if (kevCache.loaded) return kevCache.data;
  try {
    const res = await fetch('https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json');
    const json = await res.json();
    kevCache.data = json.vulnerabilities || [];
    kevCache.loaded = true;
    return kevCache.data;
  } catch { return []; }
}
async function getKevEntry(cveId) {
  const kev = await loadKEV();
  return kev.find(e => e.cveID === cveId.toUpperCase()) || null;
}

// ────────────────────────────────────────────── CVE SEARCH
async function runSearch() {
  const inputEl = document.getElementById("cve");
  const inputRaw = (inputEl?.value || "").trim();
  if (!inputRaw) return toast("ENTER A TARGET");
  const input = inputRaw.toUpperCase();

  document.getElementById("loading").style.display = "flex";

  if (!isCVE(input)) {
    document.getElementById("cveContent").innerHTML = `<div class="meta">Vendor/product search not implemented yet</div>`;
    document.getElementById("loading").style.display = "none";
    return;
  }

  try {
    const [cveRes, nvdRes, epssRes, kevEntry] = await Promise.all([
      fetch(`https://cveawg.mitre.org/api/cve/${input}`),
      fetch(`https://services.nvd.nist.gov/rest/json/cves/2.0?cveId=${input}`),
      fetch(`https://api.first.org/data/v1/epss?cve=${input}`),
      getKevEntry(input)
    ]);

    let cveData = await cveRes.json().catch(() => ({}));
    let nvdData = await nvdRes.json().catch(() => ({}));
    let epssData = (await epssRes.json().catch(() => ({}))).data?.[0];

    const cna = cveData?.containers?.cna || {};
    const desc = cna?.descriptions?.[0]?.value || "No description available";
    const published = cveData.cveMetadata?.datePublished ? new Date(cveData.cveMetadata.datePublished).toLocaleDateString() : 'N/A';
    const kevYes = !!kevEntry;
    const kevAdded = kevEntry?.dateAdded ? new Date(kevEntry.dateAdded).toLocaleDateString() : '';

    // References
    const refs = (cna.references || []).filter(r => r.url?.startsWith('https://'));
    const groupedRefs = refs.reduce((acc, r) => {
      const host = new URL(r.url).hostname.replace('www.', '');
      (acc[host] ||= []).push(r);
      return acc;
    }, {});
    let sourcesHtml = Object.entries(groupedRefs).map(([host, links]) => `
      <div class="item">
        <div class="title">${host} (${links.length})</div>
        <div class="meta">${links.map(r => linkRow(r.url, r.name || r.url)).join('<br>')}</div>
      </div>
    `).join('') || '<div class="meta">No references found</div>';

    // CVSS
    let metrics = [];
    (cna.metrics || []).forEach(m => {
      if (m.cvssV3_1) metrics.push({v:"3.1", s:m.cvssV3_1.baseScore, src:"CNA", vec:m.cvssV3_1.vectorString});
      if (m.cvssV4_0) metrics.push({v:"4.0", s:m.cvssV4_0.baseScore, src:"CNA", vec:m.cvssV4_0.vectorString});
    });
    const nvdCve = nvdData.vulnerabilities?.[0]?.cve;
    if (nvdCve?.metrics) {
      ["cvssMetricV31","cvssMetricV40"].forEach(k => {
        (nvdCve.metrics[k] || []).forEach(m => {
          const d = m.cvssData;
          if (d) metrics.push({v: k.includes("V31")?"3.1":"4.0", s:d.baseScore, src:"NVD", vec:d.vectorString});
        });
      });
    }
    const cvssHtml = metrics.map(m => {
      const cls = m.s < 4 ? 'low' : m.s < 7 ? 'medium' : m.s < 9 ? 'high' : 'critical';
      const sev = m.s < 4 ? 'LOW' : m.s < 7 ? 'MEDIUM' : m.s < 9 ? 'HIGH' : 'CRITICAL';
      return `<div class="item"><div class="title">CVSS v${m.v} – ${m.s} <span class="chip ${cls}">${sev}</span></div><div class="meta">Source: ${m.src} | Vector: ${m.vec || 'N/A'}</div></div>`;
    }).join('') || '<div class="meta">No CVSS data</div>';

    // EPSS + KEV
    const epssHtml = epssData ? `
      Score: ${Number(epssData.epss).toFixed(4)} (~${(Number(epssData.epss)*100).toFixed(2)}%)<br>
      Percentile: ${(Number(epssData.percentile)*100).toFixed(1)}%
    ` : 'No EPSS data';

    document.getElementById("cveContent").innerHTML = `
      <div class="item"><div class="title">${input} · Published: ${published}</div></div>
      <div class="item"><div class="title">Description</div><div class="meta">${desc}</div></div>
      <div class="item">
        <div class="title">Exploitation Signals</div>
        <div class="meta">
          ${kevYes ? `<span class="badge yes">CISA KEV: YES</span> ${kevAdded ? '(Added: ' + kevAdded + ')' : ''}` : '<span class="badge no">CISA KEV: NO</span>'}<br>
          EPSS: ${epssHtml}
        </div>
      </div>
      <div class="item"><div class="title">CVSS Metrics</div><div class="meta">${cvssHtml}</div></div>
      <div class="item"><div class="title">References</div><div class="meta">${sourcesHtml}</div></div>
    `;

    document.getElementById("sourcesContent").innerHTML = sourcesHtml;
    renderRelevantSearches(input);

    toast("BREACH SUCCESSFUL");

  } catch (err) {
    console.error(err);
    document.getElementById("cveContent").innerHTML = `<div class="meta">BREACH FAILED: ${err.message || 'Network error'}</div>`;
    toast("BREACH ERROR");
  } finally {
    document.getElementById("loading").style.display = "none";
  }
}

// ────────────────────────────────────────────── RELEVANT SEARCHES
function renderRelevantSearches(term) {
  const q = encodeURIComponent(term);
  const links = [
    linkRow(`https://www.exploit-db.com/search?q=${q}`, "Exploit-DB Search"),
    linkRow(`https://github.com/search?q=${q}&type=code`, "GitHub Code Search (PoCs)"),
    linkRow(`https://x.com/search?q=${q}&f=live`, "X (Twitter) Latest"),
    linkRow(`https://www.google.com/search?q=${q}+exploit+analysis+mitigation`, "Google Deep Search")
  ].join('<br>');
  document.getElementById("searchLinks").innerHTML = `<div class="meta">${links}</div>`;
}

// ────────────────────────────────────────────── VULNCHECK KEV
async function loadVulnCheck() {
  try {
    const res = await fetch('https://jakewarren.github.io/vulncheck-kev-rss/rss.xml');
    if (!res.ok) throw new Error();
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, 'application/xml');
    const items = doc.querySelectorAll('item');
    let html = '';
    const now = Date.now();
    const tenDays = 10 * 24 * 60 * 60 * 1000;
    items.forEach(item => {
      const pub = new Date(item.querySelector('pubDate')?.textContent || 0).getTime();
      if (now - pub < tenDays) {
        const title = item.querySelector('title')?.textContent || 'Unknown';
        const link = item.querySelector('link')?.textContent || '#';
        html += `<div class="item"><div class="title">${linkRow(link, title)}</div></div>`;
      }
    });
    document.getElementById("vulncheckContent").innerHTML = html || '<div class="meta">No recent additions (last 10 days)</div>';
  } catch {
    document.getElementById("vulncheckContent").innerHTML = '<div class="meta">Failed to load VulnCheck KEV</div>';
  }
}

// ────────────────────────────────────────────── EXPLOITATION WATCH
async function loadExploitationWatch() {
  const sources = [
    {name:"SecurityWeek", url:"https://www.securityweek.com/feed/"},
    {name:"BleepingComputer", url:"https://www.bleepingcomputer.com/feed/"},
    {name:"Dark Reading", url:"https://www.darkreading.com/rss.xml"},
    {name:"Help Net Security", url:"https://www.helpnetsecurity.com/feed/"},
    {name:"Unit42", url:"https://unit42.paloaltonetworks.com/feed/"},
    {name:"Krebs on Security", url:"https://krebsonsecurity.com/feed/"}
  ];

  document.getElementById("watchContent").innerHTML = '<div class="meta">Scanning feeds…</div>';

  let html = '';
  await Promise.all(sources.map(async s => {
    try {
      const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(s.url)}`);
      if (!res.ok) return;
      const text = await res.text();
      const doc = new DOMParser().parseFromString(text, 'application/xml');
      const items = Array.from(doc.querySelectorAll('item, entry')).slice(0,20);
      items.forEach(item => {
        const title = item.querySelector('title')?.textContent || '';
        const linkEl = item.querySelector('link');
        const link = linkEl?.textContent || linkEl?.getAttribute('href') || '#';
        const desc = item.querySelector('description')?.textContent || '';
        if (/(exploit|PoC|RCE|zero-day|actively exploited|in the wild)/i.test(title + desc)) {
          html += `<div class="item"><div class="title">${linkRow(link, title)}</div><div class="meta">${s.name}</div></div>`;
        }
      });
    } catch {}
  }));

  document.getElementById("watchContent").innerHTML = html || '<div class="meta">No recent exploitation signals detected</div>';
}

// ────────────────────────────────────────────── GLOBAL FEEDS
async function displayFeeds() {
  const feeds = [
    {name:"SecurityWeek", url:"https://www.securityweek.com/feed/"},
    {name:"BleepingComputer", url:"https://www.bleepingcomputer.com/feed/"},
    {name:"Dark Reading", url:"https://www.darkreading.com/rss.xml"},
    {name:"The Hacker News", url:"https://feeds.feedburner.com/TheHackersNews"},
    {name:"Krebs on Security", url:"https://krebsonsecurity.com/feed/"}
  ];

  const container = document.getElementById("feed-container");
  container.innerHTML = '<div class="meta">Loading feeds...</div>';

  let loaded = 0;
  for (const feed of feeds) {
    try {
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
      const data = await res.json();
      if (data.status !== 'ok' || !data.items?.length) continue;

      const div = document.createElement('div');
      div.className = 'feed';
      div.innerHTML = `<h2>${feed.name}</h2><ul style="margin:0; padding:0; list-style:none;">` +
        data.items.slice(0,5).map(item => `<li style="margin:8px 0;"><a href="${item.link}" target="_blank">${item.title}</a></li>`).join('') +
        '</ul>';
      container.appendChild(div);
      loaded++;
    } catch {}
  }

  if (loaded === 0) {
    container.innerHTML = '<div class="meta" style="text-align:center; padding:40px 0;">No feeds could be loaded right now</div>';
  }
}

// ────────────────────────────────────────────── TABS
function switchTab(n) {
  document.querySelectorAll('.tabs section').forEach((s,i)=>s.classList.toggle('active',i===n));
  document.querySelectorAll('nav button').forEach((b,i)=>b.classList.toggle('active',i===n));
}

// ────────────────────────────────────────────── INIT
document.addEventListener("DOMContentLoaded", () => {
  initMatrixRain();

  document.getElementById("go").onclick = runSearch;
  document.getElementById("cve").onkeydown = e => { if (e.key === "Enter") runSearch(); };

  document.getElementById("clearCve").onclick = () => {
    document.getElementById("cve").value = "";
    document.getElementById("cveContent").innerHTML = '<div class="meta">ENTER TARGET • PRESS BREACH</div>';
    document.getElementById("sourcesContent").innerHTML = '<div class="meta">Will appear after breach</div>';
    document.getElementById("searchLinks").innerHTML = '<div class="meta">Enter term above • BREACH</div>';
    toast("TERMINAL PURGED");
  };

  document.getElementById("aiAnalysis").onclick = () => {
    const modal = document.getElementById("analysisModal");
    const body = document.getElementById("analysisBody");
    const status = document.getElementById("analysisStatus");
    modal.style.display = "flex";
    status.textContent = "STATIC ANALYSIS ENGINE";
    body.textContent = `# ANALYSIS for ${document.getElementById("cve").value || "UNKNOWN"}\n\n(Full AI/static logic can be expanded here)\n\nGenerated: ${new Date().toLocaleString()}`;
  };

  document.getElementById("analysisClose").onclick = () => document.getElementById("analysisModal").style.display = "none";
  document.getElementById("analysisCopy").onclick = () => {
    navigator.clipboard.writeText(document.getElementById("analysisBody").textContent);
    toast("COPIED TO CLIPBOARD");
  };
  document.getElementById("analysisSave").onclick = () => {
    const blob = new Blob([document.getElementById("analysisBody").textContent], {type: "text/markdown"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "matrix-analysis.md";
    a.click();
    URL.revokeObjectURL(url);
  };

  document.getElementById("googleAiSearch").onclick = () => {
    const term = document.getElementById("cve").value.trim();
    if (term) {
      window.open(`https://www.google.com/search?q=${encodeURIComponent(term + " exploit poc analysis mitigation root cause")}`, "_blank");
    } else {
      toast("ENTER A TARGET FIRST");
    }
  };

  document.getElementById("watchRefresh").onclick = loadExploitationWatch;
  document.getElementById("vulncheckRefresh").onclick = loadVulnCheck;

  // Initial loads
  loadVulnCheck();
  loadExploitationWatch();
  displayFeeds();

  // Auto-refresh
  setInterval(loadExploitationWatch, 15*60*1000);
  setInterval(loadVulnCheck, 60*60*1000);
  setInterval(displayFeeds, 20*60*1000);

  toast("MATRIX ONLINE • WELCOME");
});
</script>
</body>
</html>
